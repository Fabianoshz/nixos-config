version: '3'

tasks:
  full-switch:
    cmds:
      - task: nixos-switch
      - task: home-manager-switch

  nixos-switch:
    cmds:
      - cmd: sudo nixos-rebuild switch --flake '.'
        platforms: [linux]
      - cmd: echo 'Disabled'
        platforms: [darwin]

  home-manager-switch:
    cmds:
      - home-manager switch --flake '.'

  flake-update:
    cmds:
      - nix flake update
