# yaml-language-server: $schema=https://raw.githubusercontent.com/ShadowBlip/InputPlumber/main/rootfs/usr/share/inputplumber/schema/capability_map_v1.json
# Schema version number
version: 1

# The type of configuration schema
kind: CapabilityMap

# Name for the device event map
name: flydigi-vader-4-pro

# Unique identifier of the capability mapping
id: flydigi-vader-4-pro

# List of mapped events that are activated by a specific set of activation keys.
mapping:
  - name: South
    source_events:
      - gamepad: 
          button: South
    target_event:
      gamepad:
          button: South
  - name: East
    source_events:
      - gamepad: 
          button: East
    target_event:
      gamepad:
          button: East
  - name: Left paddle
    source_events:
      - gamepad: 
          button: LeftPaddle1
    target_event:
      gamepad:
          button: LeftPaddle1
  - name: Right paddle
    source_events:
      - gamepad: 
          button: RightPaddle1
    target_event:
      gamepad:
          button: RightPaddle1

  # - name: Play/Pause
  #   source_events:
  #     - gamepad: 
  #         button: RightPaddle3
  #   target_event:
  #     keyboard:
  #         button: KeyPlayPause

# List of events to filter from the source devices
filtered_events: []
